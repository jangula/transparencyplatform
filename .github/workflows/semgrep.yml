name: Semgrep

# Static analysis (SAST). Runs free on private repos (no GitHub Advanced
# Security needed). Reports findings in the job log and as a SARIF artifact.
# Non-blocking for now; add `--error` to the scan to gate merges once the
# baseline is clean. Actions are pinned to commit SHAs (Dependabot keeps current).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC

permissions:
  contents: read

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install semgrep
        run: pip install --quiet semgrep
      - name: Scan
        run: |
          semgrep scan \
            --config p/default \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/secrets \
            --metrics off \
            --exclude node_modules --exclude dist --exclude build --exclude .next \
            --sarif --output semgrep.sarif
          python -c "import json; d=json.load(open('semgrep.sarif')); n=sum(len(r.get('results',[])) for r in d.get('runs',[])); print(f'Semgrep findings: {n}')"
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: ignore
